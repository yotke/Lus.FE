server {
    listen 80;
    server_name localhost shiftiz.com www.shiftiz.com app.shiftiz.com;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types
        text/plain
        text/css
        text/js
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Handle Angular routing (SPA)
    location / {
        try_files $uri $uri/ /index.html;

        # Prevent caching of index.html
        location ~* /index\.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # Cache static assets (allow cross-subdomain loading across *.shiftiz.com)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        access_log off;
    }

    # Translation / JSON files
    location ~* \.json$ {
        expires 1h;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Domain verification files served as plain text (no SPA fallback)
    location /.well-known/ {
        try_files $uri =404;
        add_header Content-Type text/plain;
        add_header Cache-Control "no-cache";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    error_page 404 /index.html;
}
