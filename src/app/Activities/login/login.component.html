<div class="login-page" dir="rtl">
  <div class="login-card">
    <div class="login-header">
      <h1 class="login-title">מערכת לוז</h1>
      <p class="login-subtitle">התחברות למערכת</p>
    </div>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <mat-form-field appearance="outline" class="login-field">
        <mat-label>דוא"ל</mat-label>
        <input
          matInput
          type="email"
          formControlName="email"
          autocomplete="username"
          dir="ltr"
        />
        <mat-icon matSuffix>mail_outline</mat-icon>
        <mat-error *ngIf="email?.hasError('required')">יש להזין כתובת דוא"ל.</mat-error>
        <mat-error *ngIf="email?.hasError('email')">כתובת הדוא"ל אינה תקינה.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="login-field">
        <mat-label>סיסמה</mat-label>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="password"
          autocomplete="current-password"
          dir="ltr"
        />
        <button
          type="button"
          mat-icon-button
          matSuffix
          (click)="hidePassword = !hidePassword"
          [attr.aria-label]="hidePassword ? 'הצג סיסמה' : 'הסתר סיסמה'"
          [attr.aria-pressed]="!hidePassword"
        >
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="password?.hasError('required')">יש להזין סיסמה.</mat-error>
      </mat-form-field>

      <div class="login-error" *ngIf="errorMessage">
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        class="login-submit"
        [disabled]="isSubmitting"
      >
        <span *ngIf="!isSubmitting">התחברות</span>
        <span *ngIf="isSubmitting" class="login-submit-loading">
          <mat-spinner diameter="20"></mat-spinner>
          מתחבר...
        </span>
      </button>

      <button mat-button type="button" class="login-register-link" routerLink="/Register">
        אין לך חשבון? הרשמה
      </button>

      <div class="login-divider" *ngIf="googleEnabled">
        <span>או</span>
      </div>

      <div class="login-google" *ngIf="googleEnabled">
        <div #googleButton class="login-google-button"></div>
      </div>
    </form>
  </div>
</div>
