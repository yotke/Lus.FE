<mat-form-field [title]="title" *ngIf="control" class="regular-mat-form-field">
    <mat-label>{{title}}</mat-label>
    <input matInput [placeholder]="placeholder" [formControl]="control">
</mat-form-field>
<mat-form-field [title]="title" *ngIf="!control" class="regular-mat-form-field">
    <mat-label>{{title}}</mat-label>
    <input matInput [(ngModel)]="selectedValue" [placeholder]="placeholder">
</mat-form-field>
