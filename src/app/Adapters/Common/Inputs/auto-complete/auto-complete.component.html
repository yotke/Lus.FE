<div class="auto-complete-container">
  <!-- Optional label -->
  <mat-label *ngIf="showLabel">{{ title }}</mat-label>

  <div [class]="class" [attr.data-name]="name" style="position: relative;" style="width:100%"
    [ngClass]="{ 'with-search-icon': searchIcon }">
    <!-- REACTIVE FORMS BLOCK -->
    <ng-select *ngIf="control" [disabled]="disabled" [attr.name]="'ng-select_'+title+'_' + uniqueId" appearance="fill"
      [placeholder]="placeholder" [title]="title" [formControl]="control"
      clearable="true" (change)="onNgSelectChange($event)"
    >     
      <ng-option *ngFor="let item of listInput" [value]="item.Id">
        {{ item.Name }}
      </ng-option>
    </ng-select>

    <!-- TEMPLATE-DRIVEN BLOCK -->
    <ng-select *ngIf="!control" [disabled]="disabled" [attr.name]="'ng-select_'+title+'_' + uniqueId" appearance="fill"
      [placeholder]="placeholder" clearable="true"
      (change)="onNgSelectChange($event)" [(ngModel)]="selectedValue"
    >
      <ng-option *ngFor="let item of listInput" [value]="item?.Id">
        {{ item.Name }}
      </ng-option>
    </ng-select>

    <!-- Search icon -->
    <span *ngIf="searchIcon" class="search-icon">
      <mat-icon>search</mat-icon>
    </span>

  </div>
</div>
