<div class="btn-icon-container" [matTooltip]="title" [matTooltipDisabled]="!title">
  <button 
    [disabled]="disabled" 
    (click)="onClick()" 
    type="button" 
    color="primary" 
    class="icon-btn"
    [style.backgroundColor]="color"
    [style.color]="color === 'white' ? '#6f6f6f' : 'white'"
  >
    <mat-icon>{{ icon }}</mat-icon>
  </button>
</div>
